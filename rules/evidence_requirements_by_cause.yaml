      - DT_FILING
      - COTIZACIONES_PAID
  DISCIPLINARIA_160:
    required_facts:
      - DISCIPLINARY_FACTS
      - DT_FILING
      - COTIZACIONES_PAID
  RENUNCIA:
    required_facts:
      - RESIGNATION_VOLUNTARY
      - COTIZACIONES_PAID
  OBRA_FAENA_TERMINO:
    required_facts:
      - COTIZACIONES_PAID

default_required_facts:
